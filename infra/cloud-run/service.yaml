apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: rag-research-assistant-backend
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    spec:
      containers:
        - image: gcr.io/PROJECT_ID/rag-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: production
